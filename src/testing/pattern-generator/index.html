<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #888;
      gap: 12px;
    }

    .top-info {
      font-size: 11px;
      letter-spacing: 0.05em;
      color: #444;
    }
    .top-info span { color: #2a2a2a; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tool-btn {
      background: #181818;
      border: 1px solid #2a2a2a;
      color: #555;
      padding: 5px 11px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .tool-btn.active {
      border-color: #444;
      color: #bbb;
      background: #1e1e1e;
    }
    .tool-btn kbd {
      font-size: 10px;
      background: #252525;
      border: 1px solid #3a3a3a;
      border-radius: 2px;
      padding: 1px 5px;
      color: #777;
    }

    /* ── Canvas wrapper ── */
    #canvas-wrapper {
      border: 1px solid #1e1e1e;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 0;
    }
    #canvas-wrapper.drag-over {
      border-color: hotpink;
      box-shadow: 0 0 14px rgba(255, 105, 180, 0.25);
    }

    canvas { display: block; }

    /* ── Hint ── */
    .hint {
      font-size: 10px;
      color: #2d2d2d;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <div class="top-info">
    pattern-generator <span>·</span> 1000 cells <span>·</span> 50 × 20
  </div>

  <div class="toolbar">
    <button class="tool-btn active" id="tool-select">
      ↖ Select / Move <kbd>V</kbd>
    </button>
  </div>

  <div id="canvas-wrapper">
    <canvas id="grid" width="500" height="200"></canvas>
  </div>

  <p class="hint">
    drop image &nbsp;·&nbsp; drag body = move &nbsp;·&nbsp; corners = rotate &nbsp;·&nbsp;
    edge midpoints = stretch &nbsp;·&nbsp; alt + shift + corner = scale from center
  </p>

  <script src="script.js"></script>
</body>
</html>
