<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Particle Background - Mouse Reveal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a1a2e;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .particle-background {
            position: relative;
            width: 100%;
            min-height: 100vh;
            overflow: hidden;
            background: linear-gradient(145deg, #0b1c2f 0%, #1e3a4a 100%);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background-color: #27b9b7;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(39, 185, 183, 0.6);
            
            /* Particle size variation */
            width: calc(40px + (var(--size-factor, 0) * 50px));
            height: calc(40px + (var(--size-factor, 0) * 50px));
            
            /* Static positions */
            left: var(--x, 0);
            top: var(--y, 0);
            
            /* Opacity controlled by mouse distance */
            opacity: var(--opacity, 0);
            transition: opacity 0.2s ease;
            
            /* Subtle pulse animation when visible */
            animation: pulse var(--pulse-duration, 3s) infinite ease-in-out;
        }

        /* Mouse tracker - invisible element that follows mouse */
        .mouse-tracker {
            position: fixed;
            width: 1px;
            height: 1px;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            text-align: center;
            padding: 2rem;
            backdrop-filter: blur(2px);
        }

        .content h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(39, 185, 183, 0.5);
            letter-spacing: 2px;
        }

        .content p {
            font-size: 1.2rem;
            max-width: 600px;
            opacity: 0.9;
            line-height: 1.6;
            color: #e0f0ff;
        }

        /* Pulse animation for visible particles */
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.1);
                filter: brightness(1.2);
            }
        }

        @media (max-width: 768px) {
            .content h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="particle-background">
        <div class="particles" id="particles"></div>
        <div class="mouse-tracker" id="mouseTracker"></div>
        
        <div class="content">
            <h1>CSS Particles</h1>
            <p>Move your mouse around the screen — dots appear as you move, creating a trail of light!</p>
        </div>
    </div>

    <script>
        (function() {
            const particlesContainer = document.getElementById('particles');
            const numberOfParticles = 200; // More particles for denser effect
            
            // Store particle positions for calculations
            const particles = [];
            
            // Clear container
            particlesContainer.innerHTML = '';
            
            // Create particles grid-like but with random offset
            for (let i = 0; i < numberOfParticles; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Create a grid-like distribution with random variation
                // This ensures even coverage across the screen
                const gridCols = 15;
                const gridRows = 15;
                const col = i % gridCols;
                const row = Math.floor(i / gridCols) % gridRows;
                
                // Add random offset to break up the grid pattern
                const randomOffsetX = (Math.random() - 0.5) * 8; // -4% to +4%
                const randomOffsetY = (Math.random() - 0.5) * 8;
                
                // Calculate position (with some randomness to avoid perfect grid)
                const x = (col / gridCols * 100) + randomOffsetX;
                const y = (row / gridRows * 100) + randomOffsetY;
                
                // Random size factor (0.2 to 1.2)
                const sizeFactor = 0.2 + (Math.random() * 1.0);
                
                // Random pulse duration for variety
                const pulseDuration = 2 + (Math.random() * 4);
                
                // Set CSS custom properties
                particle.style.setProperty('--x', x + '%');
                particle.style.setProperty('--y', y + '%');
                particle.style.setProperty('--size-factor', sizeFactor);
                particle.style.setProperty('--pulse-duration', pulseDuration + 's');
                
                // Store position for calculations
                particle.dataset.x = x;
                particle.dataset.y = y;
                
                // Random glow intensity
                const glowIntensity = 0.3 + (Math.random() * 0.7);
                particle.style.boxShadow = `0 0 ${30 + (glowIntensity * 30)}px rgba(39, 185, 183, ${0.3 + glowIntensity * 0.4})`;
                
                particlesContainer.appendChild(particle);
                particles.push(particle);
            }
            
            // Mouse move effect - reveal particles based on distance
            let mouseX = -100; // Start off screen
            let mouseY = -100;
            let lastMouseX = -100;
            let lastMouseY = -100;
            
            // Track mouse position
            document.addEventListener('mousemove', (e) => {
                const rect = particlesContainer.getBoundingClientRect();
                mouseX = ((e.clientX - rect.left) / rect.width) * 100; // Convert to percentage
                mouseY = ((e.clientY - rect.top) / rect.height) * 100;
                
                // Update invisible tracker for reference
                const tracker = document.getElementById('mouseTracker');
                tracker.style.left = e.clientX + 'px';
                tracker.style.top = e.clientY + 'px';
            });
            
            // Also track when mouse leaves the window
            document.addEventListener('mouseleave', () => {
                mouseX = -100;
                mouseY = -100;
            });
            
            // Function to calculate distance between two points
            function getDistance(x1, y1, x2, y2) {
                return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            }
            
            // Update particle visibility based on mouse position
            function updateParticles() {
                // Only update if mouse has moved significantly
                if (Math.abs(mouseX - lastMouseX) > 0.1 || Math.abs(mouseY - lastMouseY) > 0.1) {
                    
                    // Effect radius (in percentage of screen)
                    const BASE_RADIUS = 15; // Base radius
                    
                    particles.forEach(particle => {
                        const particleX = parseFloat(particle.dataset.x);
                        const particleY = parseFloat(particle.dataset.y);
                        
                        // Calculate distance from mouse
                        const distance = getDistance(mouseX, mouseY, particleX, particleY);
                        
                        // Calculate opacity based on distance
                        let opacity = 0;
                        
                        if (distance < BASE_RADIUS) {
                            // Inside radius - full opacity with slight falloff
                            opacity = 1 - (distance / BASE_RADIUS) * 0.3;
                        } else if (distance < BASE_RADIUS * 2) {
                            // Transition zone - fade out
                            opacity = 0.7 * (1 - (distance - BASE_RADIUS) / BASE_RADIUS);
                        } else if (distance < BASE_RADIUS * 3) {
                            // Outer zone - very faint
                            opacity = 0.2 * (1 - (distance - BASE_RADIUS * 2) / BASE_RADIUS);
                        } else {
                            opacity = 0;
                        }
                        
                        // Add subtle randomness to opacity for visual interest
                        opacity = opacity * (0.8 + (Math.random() * 0.2));
                        
                        // Set the opacity
                        particle.style.setProperty('--opacity', opacity);
                    });
                    
                    lastMouseX = mouseX;
                    lastMouseY = mouseY;
                }
                
                requestAnimationFrame(updateParticles);
            }
            
            // Start the update loop
            updateParticles();
            
            // Add some extra particles for edges
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Place some particles near edges
                let x, y;
                if (i < 25) {
                    // Top and bottom edges
                    x = Math.random() * 100;
                    y = (Math.random() < 0.5) ? Math.random() * 10 : 90 + (Math.random() * 10);
                } else {
                    // Left and right edges
                    x = (Math.random() < 0.5) ? Math.random() * 10 : 90 + (Math.random() * 10);
                    y = Math.random() * 100;
                }
                
                particle.style.setProperty('--x', x + '%');
                particle.style.setProperty('--y', y + '%');
                particle.style.setProperty('--size-factor', 0.3 + (Math.random() * 0.5));
                particle.style.setProperty('--pulse-duration', (2 + Math.random() * 3) + 's');
                
                particle.dataset.x = x;
                particle.dataset.y = y;
                
                particle.style.boxShadow = `0 0 20px rgba(39, 185, 183, 0.4)`;
                
                particlesContainer.appendChild(particle);
                particles.push(particle);
            }
            
        })();
    </script>
</body>
</html>
