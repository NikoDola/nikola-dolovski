<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Loop</title>
</head>
<body>

<div class="mainWrapper">

  <!-- Background split -->
  <div class="grayBg"></div>
  <div class="blackBg"></div>

  <!-- Animated circles -->
  <div class="circles">
    <div class="group">
      <div class="circleGray"></div>
      <div class="circleBlack"></div>
      <div class="circleGray"></div>
      <div class="circleBlack"></div>
      <div class="circleGray"></div>
      <div class="circleBlack"></div>
    </div>

    <div class="group">
      <div class="circleGray"></div>
      <div class="circleBlack"></div>
      <div class="circleGray"></div>
      <div class="circleBlack"></div>
      <div class="circleGray"></div>
      <div class="circleBlack"></div>
    </div>
  </div>

</div>

</body>
</html>
