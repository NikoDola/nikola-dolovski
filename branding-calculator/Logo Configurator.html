  const handleNext = () => {
    const e = validate();

  };

  return (
    <div className="screen-enter">
      <BackButton onClick={onBack} />

      <div style={{ marginBottom: T.space["8"] }}>

          placeholder="e.g. Apex Studio"
          value={companyName}
          onChange={v => { setCompany(v); setErrors(p => ({...p, companyName: ""})); }}
          required
          error={errors.companyName}
        />
        <TextInput
          label="Tagline"
          placeholder="e.g. Crafting tomorrow's brands"
          value={tagline}
          onChange={setTagline}

function VariationsScreen({ onBack, onNext }) {
  const T = window.TOKENS;
  const [selected, setSelected] = React.useState([]);

  const toggle = (id) => setSelected(prev =>
    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
  );

  const variations = [
    { id: "vertical",   title: "Vertical",    description: "Icon stacked above the brand name. Ideal for social profiles and square formats.", demo: <VerticalLogoDemo /> },
    { id: "horizontal", title: "Horizontal",  description: "Icon beside the brand name. The most versatile format — great for headers and cards.", demo: <HorizontalLogoDemo /> },
    { id: "badge",      title: "Badge / Seal", description: "Name wraps around the icon in a circular seal. Adds a premium, established feel.", demo: <BadgeLogoDemo /> },
    { id: "icon",       title: "Icon Only",   description: "Just the logomark, no text. Used as a standalone symbol across all touchpoints.", demo: <IconOnlyDemo /> },
    { id: "wordmark",   title: "Wordmark",    description: "Typography-only logo. The brand name itself becomes the visual identity.", demo: <WordmarkDemo /> },
  ];

  // Pricing: first selection free, each additional $25
  const extraCount = Math.max(0, selected.length - 1);
  const extrasTotal = extraCount * 25;

  const getPriceLabel = (id) => {
    if (selected.length === 0) return "Free";
    if (selected[0] === id) return "Included";
    if (selected.includes(id)) return "+$25";
    return "+$25 ea.";
  };

  return (
    <div className="screen-enter">
      <BackButton onClick={onBack} />
      <div style={{ marginBottom: T.space["6"] }}>
        <h1 style={{ fontSize: T.fontSize["2xl"], fontWeight: T.fontWeight.bold, color: T.color.textPrimary, letterSpacing: T.letterSpacing.tight, lineHeight: T.lineHeight.tight, marginBottom: T.space["3"] }}>
          Choose your logo variations
        </h1>
        <p style={{ fontSize: T.fontSize.base, color: T.color.textSecondary, lineHeight: T.lineHeight.normal }}>
          Your first variation is <strong>included free</strong>. Each additional format is <strong>+$25</strong>.
        </p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: T.space["4"], marginBottom: T.space["6"] }}>
        {variations.map(v => {
          const priceLabel = getPriceLabel(v.id);
          const isFree = priceLabel === "Free" || priceLabel === "Included";
          return (
            <div key={v.id} style={{ position: "relative" }}>
              {/* Price badge */}
              <div style={{
                position: "absolute", top: T.space["3"], left: T.space["3"], zIndex: 2,
                background: isFree ? T.color.accent : T.color.surface,
                border: `1px solid ${isFree ? T.color.accent : T.color.border}`,
                color: isFree ? "#fff" : T.color.textSecondary,
                fontSize: T.fontSize.xs, fontWeight: T.fontWeight.semibold,
                borderRadius: T.radius.full, padding: `2px ${T.space["3"]}`,
                letterSpacing: T.letterSpacing.wide,
              }}>{priceLabel}</div>
              <VariationCard title={v.title} description={v.description} selected={selected.includes(v.id)} onClick={() => toggle(v.id)}>
                {v.demo}
              </VariationCard>
            </div>
          );
        })}
      </div>

      {/* Running total */}
      {selected.length > 1 && (
        <div style={{ background: T.color.accentLight, border: `1px solid ${T.color.accentMuted}`, borderRadius: T.radius.lg, padding: T.space["4"], marginBottom: T.space["6"], display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontSize: T.fontSize.sm, color: T.color.textSecondary }}>
            1 included + {extraCount} extra variation{extraCount > 1 ? "s" : ""}
          </span>
          <span style={{ fontSize: T.fontSize.base, fontWeight: T.fontWeight.bold, color: T.color.accent }}>+${extrasTotal} added</span>
        </div>
      )}

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: T.fontSize.sm, color: T.color.textMuted }}>
          {selected.length === 0 ? "Select at least one variation" : `${selected.length} variation${selected.length > 1 ? "s" : ""} selected`}
        </span>
        <Button onClick={() => selected.length > 0 && onNext(selected)} disabled={selected.length === 0} size="lg"
          icon={<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}>
          Next — Style
        </Button>
      </div>
    </div>
  );
}

      <circle cx="7" cy="7" r="5.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeDasharray="20 14" opacity="0.6"/>

const MAX_SELECT = 6;
const BATCH_SIZE = 9;

function StylePickerScreen({ onBack, onNext, accentColor }) {
  const T = window.TOKENS;
  const [selected, setSelected]        = React.useState([]);
  const [inspirationFile, setInspFile] = React.useState(null);
  const [loadingFirst, setLoadingFirst] = React.useState(true);
  const [loadingMore, setLoadingMore]  = React.useState(false);
  const [visibleCount, setVisibleCount] = React.useState(BATCH_SIZE);
  const fileRef = React.useRef();

  // Initial skeleton → cards
  React.useEffect(() => {
    const t = setTimeout(() => setLoadingFirst(false), 900);
    return () => clearTimeout(t);
  }, []);

  // Remove unused IntersectionObserver

  const toggleSelect = (id) => {
    setSelected(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= MAX_SELECT) return prev; // cap at 6
      return [...prev, id];
    });
  };

  const visiblePresets = STYLE_PRESETS.slice(0, visibleCount);
  const hasMore = visibleCount < STYLE_PRESETS.length;

  return (
    <div className="screen-enter">
      <BackButton onClick={onBack} />
      <div style={{ marginBottom: T.space["8"] }}>
        <h1 style={{ fontSize: T.fontSize["2xl"], fontWeight: T.fontWeight.bold, color: T.color.textPrimary, letterSpacing: T.letterSpacing.tight, lineHeight: T.lineHeight.tight, marginBottom: T.space["3"] }}>
          Choose a design style
        </h1>
        <p style={{ fontSize: T.fontSize.base, color: T.color.textSecondary, lineHeight: T.lineHeight.normal }}>
          Pick up to <strong>6 styles</strong> that resonate with your brand. We'll use these as the visual foundation.
        </p>
      </div>

      {/* Inspiration upload banner */}
      <div
        onClick={() => fileRef.current.click()}
        style={{
          display: "flex", alignItems: "center", gap: T.space["4"],
          background: inspirationFile ? T.color.accentLight : T.color.surface,
          border: `1.5px dashed ${inspirationFile ? T.color.accent : T.color.border}`,
          borderRadius: T.radius.lg,
          padding: T.space["5"],
          cursor: "pointer",
          marginBottom: T.space["6"],
          transition: "all 180ms ease",
        }}
      >
        <input ref={fileRef} type="file" accept="image/*,.pdf,.svg" style={{ display: "none" }}
          onChange={e => e.target.files[0] && setInspFile(e.target.files[0])} />
        <div style={{ width: "40px", height: "40px", borderRadius: T.radius.md, background: inspirationFile ? T.color.accent : T.color.surfaceAlt, border: `1px solid ${T.color.border}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 12V4M5 8l4-4 4 4" stroke={inspirationFile ? "#fff" : T.color.textMuted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            <rect x="3" y="14" width="12" height="2" rx="1" fill={inspirationFile ? "#fff" : T.color.border}/>
          </svg>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: T.fontSize.base, fontWeight: T.fontWeight.semibold, color: inspirationFile ? T.color.accent : T.color.textPrimary }}>
            {inspirationFile ? inspirationFile.name : "Upload inspiration from a competitor or brand you admire"}
          </div>
          <div style={{ fontSize: T.fontSize.xs, color: T.color.textMuted, marginTop: "2px" }}>
            {inspirationFile ? `${(inspirationFile.size/1024).toFixed(1)} KB · Click to replace` : "Optional — JPG, PNG, PDF, SVG · Or just pick styles below"}
          </div>
        </div>
        {!inspirationFile && (
          <div style={{ fontSize: T.fontSize.xs, fontWeight: T.fontWeight.semibold, color: T.color.accent, border: `1px solid ${T.color.accentMuted}`, borderRadius: T.radius.full, padding: `${T.space["1"]} ${T.space["3"]}`, whiteSpace: "nowrap" }}>
            Browse
          </div>
        )}
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: T.space["4"], marginBottom: T.space["5"] }}>
        <div style={{ flex: 1, height: "1px", background: T.color.border }} />
        <span style={{ fontSize: T.fontSize.xs, color: T.color.textMuted, letterSpacing: T.letterSpacing.wide, textTransform: "uppercase" }}>or choose from styles below</span>
        <div style={{ flex: 1, height: "1px", background: T.color.border }} />
      </div>

      {/* Selection counter badge */}
      {selected.length > 0 && (
        <div style={{ display: "flex", alignItems: "center", gap: T.space["3"], marginBottom: T.space["4"] }}>
          <div style={{ background: T.color.accentLight, border: `1px solid ${T.color.accentMuted}`, borderRadius: T.radius.full, padding: `${T.space["1"]} ${T.space["4"]}`, fontSize: T.fontSize.sm, fontWeight: T.fontWeight.semibold, color: T.color.accent }}>
            {selected.length} / {MAX_SELECT} selected
          </div>
          {selected.length >= MAX_SELECT && (
            <span style={{ fontSize: T.fontSize.xs, color: T.color.textMuted }}>Maximum reached — deselect one to choose another</span>
          )}
        </div>
      )}

      {/* Style cards grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: T.space["4"], marginBottom: T.space["6"] }}>
        {loadingFirst
          ? [...Array(BATCH_SIZE)].map((_, i) => (
              <div key={i} className="skeleton" style={{ aspectRatio: "4/3", borderRadius: "12px" }} />
            ))
          : visiblePresets.map((s, i) => (
              <StyleCard
                key={s.id}
                label={s.label}
                sublabel={s.sublabel}
                selected={selected.includes(s.id)}
                onClick={() => toggleSelect(s.id)}
                index={i}
                dimmed={selected.length >= MAX_SELECT && !selected.includes(s.id)}
              >
                {s.preview(accentColor || T.color.accent)}
              </StyleCard>
            ))
        }
        {/* Lazy-load skeletons */}
        {loadingMore && [...Array(BATCH_SIZE)].map((_, i) => (
          <div key={"more-"+i} className="skeleton" style={{ aspectRatio: "4/3", borderRadius: "12px" }} />
        ))}
      </div>

      {!loadingFirst && hasMore && (
        <div style={{ display: "flex", justifyContent: "center", paddingBottom: T.space["6"] }}>
          <button
            onClick={() => {
              if (loadingMore) return;
              setLoadingMore(true);
              setTimeout(() => {
                setVisibleCount(c => Math.min(c + BATCH_SIZE, STYLE_PRESETS.length));
                setLoadingMore(false);
              }, 800);
            }}
            style={{
              display: "inline-flex", alignItems: "center", gap: T.space["2"],
              background: T.color.surface, border: `1.5px solid ${T.color.border}`,
              borderRadius: T.radius.full, padding: `${T.space["3"]} ${T.space["6"]}`,
              fontSize: T.fontSize.sm, fontWeight: T.fontWeight.medium,
              color: T.color.textSecondary, fontFamily: T.font.sans,
              cursor: loadingMore ? "wait" : "pointer",
              transition: "all 180ms ease",
              opacity: loadingMore ? 0.6 : 1,
            }}
          >
            {loadingMore
              ? <><Spinner /> Loading...</>
              : <><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3 9l4 4 4-4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg> Load more styles</>
            }
          </button>
        </div>
      )}

      {!loadingFirst && !hasMore && (
        <div style={{ textAlign: "center", padding: `${T.space["2"]} 0 ${T.space["6"]}`, fontSize: T.fontSize.xs, color: T.color.textMuted, letterSpacing: T.letterSpacing.wide, textTransform: "uppercase" }}>
          All styles loaded
        </div>
      )}

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", paddingTop: T.space["4"], borderTop: `1px solid ${T.color.border}` }}>
        <span style={{ fontSize: T.fontSize.sm, color: T.color.textMuted }}>
          {selected.length === 0 && !inspirationFile
            ? "Choose up to 6 styles or upload inspiration"
            : selected.length > 0
              ? `${selected.length} style${selected.length > 1 ? "s" : ""} selected`
              : `Inspiration: ${inspirationFile?.name}`
          }
        </span>
        <Button
          onClick={() => (selected.length > 0 || inspirationFile) && onNext({ styles: selected, inspirationFile })}
          disabled={selected.length === 0 && !inspirationFile}
          size="lg"
          icon={<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        >
          Next
        </Button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// COLOR PICKER MODAL (HSV)
// ─────────────────────────────────────────────────────────────
function hsvToHex(h, s, v) {
  s /= 100; v /= 100;
  const c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
  let r, g, b;
  if (h < 60)       { r=c; g=x; b=0; }
  else if (h < 120) { r=x; g=c; b=0; }
  else if (h < 180) { r=0; g=c; b=x; }
  else if (h < 240) { r=0; g=x; b=c; }
  else if (h < 300) { r=x; g=0; b=c; }
  else              { r=c; g=0; b=x; }
  const toHex = n => Math.round((n + m) * 255).toString(16).padStart(2, "0");
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`.toUpperCase();
}
function hexToHsv(hex) {
  const clean = hex.replace(/^#/, "");
  if (clean.length !== 6) return null;
  const r = parseInt(clean.slice(0,2),16)/255;
  const g = parseInt(clean.slice(2,4),16)/255;
  const b = parseInt(clean.slice(4,6),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  let h = 0;
  if (d !== 0) {
    if (max === r)      h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else                h = (r - g) / d + 4;
    h = Math.round(h * 60); if (h < 0) h += 360;
  }
  return { h, s: max === 0 ? 0 : Math.round(d / max * 100), v: Math.round(max * 100) };
}

function ColorPickerModal({ onAdd, onClose }) {
  const T = window.TOKENS;
  const [hue, setHue]     = React.useState(210);
  const [sat, setSat]     = React.useState(80);
  const [val, setVal]     = React.useState(90);
  const [hexIn, setHexIn] = React.useState("");
  const [hexErr, setHexErr] = React.useState("");
  const squareRef = React.useRef();
  const hueRef    = React.useRef();
  const popupRef  = React.useRef();
  const dragging  = React.useRef(null);

  const currentHex = hsvToHex(hue, sat, val);
  React.useEffect(() => { setHexIn(currentHex.slice(1)); }, [hue, sat, val]);

  // Escape key + click outside to close
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    const onOutside = (e) => { if (popupRef.current && !popupRef.current.contains(e.target)) onClose(); };
    window.addEventListener("keydown", onKey);
    document.addEventListener("mousedown", onOutside);
    return () => {
      window.removeEventListener("keydown", onKey);
      document.removeEventListener("mousedown", onOutside);
    };
  }, []);

  const getSquarePos = (e, el) => {
    const r = el.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
    return {
      s: Math.round(Math.max(0, Math.min(1, (cx - r.left) / r.width)) * 100),
      v: Math.round(Math.max(0, Math.min(1, 1 - (cy - r.top) / r.height)) * 100),
    };
  };
  const getHuePos = (e, el) => {
    const r = el.getBoundingClientRect();
    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
    return Math.round(Math.max(0, Math.min(1, (cy - r.top) / r.height)) * 360);
  };

  React.useEffect(() => {
    const onMove = (e) => {
      if (!dragging.current) return;
      if (dragging.current === "square") { const p = getSquarePos(e, squareRef.current); setSat(p.s); setVal(p.v); }
      else { setHue(getHuePos(e, hueRef.current)); }
    };
    const onUp = () => { dragging.current = null; };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, []);

  const handleHexInput = (v) => {
    const clean = v.replace(/[^0-9A-Fa-f]/g, "").slice(0, 6);
    setHexIn(clean); setHexErr("");
    if (clean.length === 6) { const hsv = hexToHsv("#" + clean); if (hsv) { setHue(hsv.h); setSat(hsv.s); setVal(hsv.v); } }
  };

  const handleAdd = () => {
    if (hexIn.length !== 6) { setHexErr("Complete the hex code"); return; }
    onAdd(currentHex);
  };

  const hueColor = `hsl(${hue}, 100%, 50%)`;

  return (
    <div ref={popupRef} style={{
      position: "absolute", top: "calc(100% + 10px)", left: 0, zIndex: 200,
      background: T.color.surface, borderRadius: T.radius.xl,
      boxShadow: "0 8px 32px rgba(26,23,20,0.18), 0 2px 8px rgba(26,23,20,0.10)",
      padding: T.space["5"], width: "300px",
      border: `1px solid ${T.color.border}`,
    }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: T.space["4"] }}>
        <span style={{ fontSize: T.fontSize.base, fontWeight: T.fontWeight.semibold, color: T.color.textPrimary }}>Select a color</span>
        <button onClick={onClose} style={{ width: "26px", height: "26px", borderRadius: T.radius.full, border: `1px solid ${T.color.border}`, background: T.color.surfaceAlt, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: T.color.textSecondary }}>
          <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1 1l7 7M8 1L1 8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/></svg>
        </button>
      </div>

      {/* Picker: square + hue */}
      <div style={{ display: "flex", gap: T.space["3"], marginBottom: T.space["4"] }}>
        <div ref={squareRef}
          onMouseDown={e => { dragging.current = "square"; const p = getSquarePos(e, squareRef.current); setSat(p.s); setVal(p.v); }}
          style={{ flex: 1, aspectRatio: "1/1", borderRadius: T.radius.md, cursor: "crosshair", position: "relative", overflow: "hidden", userSelect: "none", background: hueColor, boxShadow: `inset 0 0 0 1px ${T.color.border}` }}
        >
          <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to right, #fff, transparent)" }} />
          <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, #000, transparent)" }} />
          <div style={{ position: "absolute", left: `${sat}%`, top: `${100 - val}%`, width: "13px", height: "13px", borderRadius: "50%", border: "2.5px solid #fff", boxShadow: "0 1px 4px rgba(0,0,0,0.4)", transform: "translate(-50%,-50%)", pointerEvents: "none", background: currentHex }} />
        </div>
        <div style={{ width: "18px", position: "relative", flexShrink: 0 }}>
          <div ref={hueRef}
            onMouseDown={e => { dragging.current = "hue"; setHue(getHuePos(e, hueRef.current)); }}
            style={{ width: "100%", height: "100%", borderRadius: T.radius.sm, cursor: "pointer", userSelect: "none", background: "linear-gradient(to bottom,#f00 0%,#ff0 17%,#0f0 33%,#0ff 50%,#00f 67%,#f0f 83%,#f00 100%)", boxShadow: `inset 0 0 0 1px ${T.color.border}` }}
          />
          <div style={{ position: "absolute", left: "-3px", right: "-3px", top: `${(hue / 360) * 100}%`, height: "4px", borderRadius: "2px", background: "#fff", boxShadow: "0 0 0 1.5px rgba(0,0,0,0.25)", pointerEvents: "none", transform: "translateY(-50%)" }} />
        </div>
      </div>

      {/* Bottom row: swatch + hex + add */}
      <div style={{ display: "flex", gap: T.space["2"], alignItems: "center" }}>
        <div style={{ width: "34px", height: "34px", borderRadius: T.radius.md, background: currentHex, border: `1px solid ${T.color.border}`, flexShrink: 0 }} />
        <div style={{ flex: 1, display: "flex", alignItems: "center", border: `1.5px solid ${hexErr ? T.color.error : T.color.border}`, borderRadius: T.radius.md, overflow: "hidden", background: T.color.surfaceAlt }}>
          <span style={{ padding: `0 ${T.space["1"]} 0 ${T.space["3"]}`, fontSize: T.fontSize.sm, color: T.color.textMuted, fontFamily: T.font.mono, userSelect: "none" }}>#</span>
          <input value={hexIn} onChange={e => handleHexInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter") handleAdd(); if (e.key === "Escape") onClose(); }}
            placeholder="D97757"
            style={{ flex: 1, border: "none", outline: "none", background: "transparent", fontFamily: T.font.mono, fontSize: T.fontSize.sm, color: T.color.textPrimary, padding: `${T.space["2"]} ${T.space["1"]} ${T.space["2"]} 0`, textTransform: "uppercase", width: "100%" }}
          />
        </div>
        <Button onClick={handleAdd} size="sm">Add</Button>
      </div>
      {hexErr && <div style={{ fontSize: T.fontSize.xs, color: T.color.error, marginTop: T.space["2"] }}>{hexErr}</div>}
    </div>
  );
}

function ColorFamilyCard({ family, selected, onClick, index, dimmed }) {
  const T = window.TOKENS;
  const [hovered, setHovered] = React.useState(false);
  const [visible, setVisible] = React.useState(false);

  React.useEffect(() => {
    const t = setTimeout(() => setVisible(true), index * 60);
    return () => clearTimeout(t);
  }, [index]);

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        borderRadius: T.radius.lg,
        border: `3px solid ${selected ? T.color.accent : hovered ? T.color.accentMuted : "transparent"}`,
        cursor: "pointer",
        transition: "all 200ms cubic-bezier(0,0,0.2,1)",
        boxShadow: selected ? T.shadow.lg : hovered ? T.shadow.md : T.shadow.sm,
        overflow: "hidden",
        opacity: visible ? (dimmed ? 0.35 : 1) : 0,
        cursor: dimmed ? "not-allowed" : "pointer",
        transform: visible ? "translateY(0) scale(1)" : "translateY(10px) scale(0.97)",
        position: "relative",
      }}
    >
      {selected && (
        <div style={{ position: "absolute", top: 8, right: 8, width: "22px", height: "22px", borderRadius: "50%", background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 3, boxShadow: "0 2px 6px rgba(0,0,0,0.2)" }}>
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l2.5 2.5 5-5" stroke={T.color.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
      )}

      {/* 3×3 color grid — fills entire card */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gridTemplateRows: "repeat(3, 1fr)", aspectRatio: "1/1" }}>
        {family.colors.map((hex, i) => (
          <div key={i} style={{ background: hex, aspectRatio: "1/1" }} />
        ))}
      </div>

      {/* Label */}
      <div style={{ padding: `${T.space["3"]} ${T.space["4"]}`, background: T.color.surface }}>
        <div style={{ fontSize: T.fontSize.sm, fontWeight: T.fontWeight.semibold, color: T.color.textPrimary }}>{family.label}</div>
        <div style={{ fontSize: T.fontSize.xs, color: T.color.textMuted, marginTop: "2px" }}>{family.sublabel}</div>
      </div>
    </div>
  );
}

function ColorPickerScreen({ onBack, onNext, serviceType }) {
  const T = window.TOKENS;
  const MAX_COLORS = 5;
  const MAX_CUSTOM = 10;
  const [selected, setSelected]       = React.useState([]);
  const [useSameColors, setUseSame]   = React.useState(false);
  const [customColors, setCustom]     = React.useState([]);
  const [showPicker, setShowPicker]   = React.useState(false);

  const toggle = (id) => {
    setSelected(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= MAX_COLORS) return prev;
      return [...prev, id];
    });
  };

  const canProceed = useSameColors || selected.length > 0 || customColors.length > 0;

  return (
    <div className="screen-enter">
      <BackButton onClick={onBack} />
      <div style={{ marginBottom: T.space["8"] }}>
        <h1 style={{ fontSize: T.fontSize["2xl"], fontWeight: T.fontWeight.bold, color: T.color.textPrimary, letterSpacing: T.letterSpacing.tight, lineHeight: T.lineHeight.tight, marginBottom: T.space["3"] }}>
          Choose a color direction
        </h1>
        <p style={{ fontSize: T.fontSize.base, color: T.color.textSecondary, lineHeight: T.lineHeight.normal }}>
          Pick up to <strong>5 palettes</strong>, add custom hex colors, or both.
        </p>
      </div>

      {/* Use same colors — redesign only */}
      {serviceType === "redesign" && (
        <div
          onClick={() => setUseSame(v => !v)}
          style={{
            display: "flex", alignItems: "center", gap: T.space["4"],
            background: useSameColors ? T.color.accentLight : T.color.surface,
            border: `1.5px solid ${useSameColors ? T.color.accent : T.color.border}`,
            borderRadius: T.radius.lg, padding: T.space["5"], cursor: "pointer",
            marginBottom: T.space["4"], transition: "all 180ms ease",
          }}
        >
          <div style={{
            width: "22px", height: "22px", borderRadius: T.radius.full, flexShrink: 0,
            border: `2px solid ${useSameColors ? T.color.accent : T.color.border}`,
            background: useSameColors ? T.color.accent : "transparent",
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 180ms ease",
          }}>
            {useSameColors && <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 5.5l2.5 2.5 5-5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
          <div>
            <div style={{ fontSize: T.fontSize.base, fontWeight: T.fontWeight.semibold, color: useSameColors ? T.color.accent : T.color.textPrimary }}>Use the same colors as my current logo</div>
            <div style={{ fontSize: T.fontSize.xs, color: T.color.textMuted, marginTop: "2px" }}>We'll extract and carry over the color palette from your uploaded logo</div>
          </div>
        </div>
      )}

      {/* Custom color input row */}
      <div style={{
        display: "flex", alignItems: "center", gap: T.space["3"], flexWrap: "wrap",
        background: T.color.surface, border: `1.5px solid ${T.color.border}`,
        borderRadius: T.radius.lg, padding: `${T.space["4"]} ${T.space["5"]}`,
        marginBottom: T.space["5"], minHeight: "60px",
      }}>
        {/* (+) button with anchored picker */}
        {customColors.length < MAX_CUSTOM && (
          <div style={{ position: "relative", display: "flex", alignItems: "center", gap: T.space["3"] }}>
            <button
              onClick={() => setShowPicker(v => !v)}
              style={{
                width: "36px", height: "36px", borderRadius: T.radius.md, flexShrink: 0,
                background: showPicker ? T.color.accentLight : T.color.surfaceAlt,
                border: `1.5px solid ${showPicker ? T.color.accent : T.color.border}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                cursor: "pointer", transition: "all 150ms ease",
                color: showPicker ? T.color.accent : T.color.textSecondary, fontFamily: T.font.sans,
              }}
            >
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
            </button>
            {customColors.length === 0 && !showPicker && (
              <span style={{ fontSize: T.fontSize.sm, color: T.color.textMuted }}>Add a custom color</span>
            )}
            {showPicker && (
              <ColorPickerModal
                onAdd={(hex) => {
                  if (!customColors.includes(hex) && customColors.length < MAX_CUSTOM) {
                    setCustom(prev => [...prev, hex]);
                  }
                  setShowPicker(false);
                }}
                onClose={() => setShowPicker(false)}
              />
            )}

        {/* Color swatches */}
        {customColors.map((hex, i) => (
          <div key={hex+i} style={{ position: "relative", flexShrink: 0 }} title={hex}>

              onClick={() => setCustom(prev => prev.filter((_, j) => j !== i))}
              style={{ position: "absolute", top: "-5px", right: "-5px", width: "16px", height: "16px", borderRadius: "50%", background: T.color.textPrimary, border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", opacity: 0, transition: "opacity 150ms ease" }}

              <svg width="7" height="7" viewBox="0 0 7 7" fill="none"><path d="M1 1l5 5M6 1L1 6" stroke="#fff" strokeWidth="1.4" strokeLinecap="round"/></svg>

        <div style={{ flex: 1, height: "1px", background: T.color.border }} />
      </div>

      {/* Counter badge */}
      {selected.length > 0 && (
        <div style={{ display: "flex", alignItems: "center", gap: T.space["3"], marginBottom: T.space["4"] }}>
          <div style={{ background: T.color.accentLight, border: `1px solid ${T.color.accentMuted}`, borderRadius: T.radius.full, padding: `${T.space["1"]} ${T.space["4"]}`, fontSize: T.fontSize.sm, fontWeight: T.fontWeight.semibold, color: T.color.accent }}>
            {selected.length} / {MAX_COLORS} selected
          </div>
          {selected.length >= MAX_COLORS && <span style={{ fontSize: T.fontSize.xs, color: T.color.textMuted }}>Maximum reached</span>}
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: T.space["4"], marginBottom: T.space["10"] }}>
        {COLOR_FAMILIES.map((family, i) => (
          <ColorFamilyCard
            key={family.id}
            family={family}
            selected={selected.includes(family.id)}
            onClick={() => toggle(family.id)}
            index={i}
            dimmed={selected.length >= MAX_COLORS && !selected.includes(family.id)}
          />
        ))}
      </div>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", paddingTop: T.space["4"], borderTop: `1px solid ${T.color.border}` }}>
        <span style={{ fontSize: T.fontSize.sm, color: T.color.textMuted }}>
          {!canProceed ? "Select a palette, add custom colors, or use your logo's colors" : [
            selected.length > 0 && `${selected.length} palette${selected.length > 1 ? "s" : ""}`,
            customColors.length > 0 && `${customColors.length} custom color${customColors.length > 1 ? "s" : ""}`,
            useSameColors && "using logo colors",
          ].filter(Boolean).join(" · ")}
        </span>
        <Button
          onClick={() => canProceed && onNext({ colorFamilies: selected, customColors, useSameColors })}
          disabled={!canProceed}
          size="lg"
          icon={<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        >
          Next — Review Order
        </Button>
      </div>
    </div>
  );
}

function FontCard({ font, selected, onClick, index, dimmed }) {
  const T = window.TOKENS;
  const [visible, setVisible] = React.useState(false);
  const [hovered, setHovered] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(() => setVisible(true), index * 60); return () => clearTimeout(t); }, [index]);
  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: selected ? T.color.accentLight : T.color.surface,
        border: `2px solid ${selected ? T.color.accent : hovered ? T.color.accentMuted : T.color.border}`,
        borderRadius: T.radius.lg, padding: T.space["5"], cursor: dimmed ? "not-allowed" : "pointer",
        transition: "all 200ms ease", position: "relative",
        opacity: !visible ? 0 : dimmed ? 0.35 : 1,
        transform: visible ? "translateY(0)" : "translateY(8px)",
      }}
    >
      {selected && (
        <div style={{ position: "absolute", top: T.space["3"], right: T.space["3"], width: "20px", height: "20px", borderRadius: "50%", background: T.color.accent, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5l2.5 2.5 4.5-4.5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
      )}
      <div style={{ fontFamily: font.family, fontWeight: font.weight, fontSize: "22px", color: T.color.textPrimary, lineHeight: 1.2, marginBottom: T.space["2"], letterSpacing: "-0.01em" }}>
        {font.name}
      </div>
      <div style={{ fontFamily: font.family, fontWeight: 400, fontSize: "13px", color: T.color.textSecondary, fontStyle: "italic", marginBottom: T.space["3"] }}>
        {font.sample}
      </div>
      {font.sublabel && (
        <div style={{ fontSize: T.fontSize.xs, color: T.color.textMuted, background: T.color.surfaceAlt, borderRadius: T.radius.sm, padding: `2px ${T.space["2"]}`, display: "inline-block" }}>{font.sublabel}</div>
      )}
      <div style={{ marginTop: T.space["2"], fontSize: T.fontSize.xs, fontWeight: T.fontWeight.semibold, color: T.color.textMuted, letterSpacing: T.letterSpacing.wide, textTransform: "uppercase" }}>
        {font.name}
      </div>
    </div>
  );
}

function TypographyScreen({ onBack, onNext, serviceType, selectedVariations }) {
  const T = window.TOKENS;
  const MAX_FONTS = 10;
  const BATCH = 9;
  const [sameBrandFont,   setSameBrand]   = React.useState(false);
  const [uploadedFont,    setUploadFont]  = React.useState(null);
  const [fontName,        setFontName]    = React.useState("");
  const [typographyType,  setTypoType]    = React.useState(null);
  const [inspireFile,     setInspireFile] = React.useState(null);
  const [inspireLink,     setInspireLink] = React.useState("");
  const [activeCategory,  setActiveCategory] = React.useState("serif");
  const [selectedFonts,   setSelectedFonts] = React.useState([]);
  const [visibleCount,    setVisible]     = React.useState(BATCH);
  const [loadingMore,     setLoadingMore] = React.useState(false);
  const fontInputRef  = React.useRef();
  const inspireRef    = React.useRef();

  const isWordmark  = selectedVariations.includes("wordmark") && selectedVariations.length === 1;
  const isRedesign  = serviceType === "redesign";
  const customPrice = isWordmark ? 0 : 100;
  const canProceed  = typographyType !== null || sameBrandFont;

  const currentFonts = FONT_CATEGORIES[activeCategory].fonts;
  const visibleFonts = currentFonts.slice(0, visibleCount);
  const hasMore      = visibleCount < currentFonts.length;

  // Reset visible count when category changes
  React.useEffect(() => { setVisible(BATCH); }, [activeCategory]);

  const toggleFont = (id) => {
    setSelectedFonts(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= MAX_FONTS) return prev;
      return [...prev, id];
    });
  };

  const loadMore = () => {
    setLoadingMore(true);
    setTimeout(() => {
      setVisible(v => Math.min(v + BATCH, currentFonts.length));
      setLoadingMore(false);
    }, 700);
  };

  return (
    <div className="screen-enter">
      <BackButton onClick={onBack} />
      <div style={{ marginBottom: T.space["8"] }}>
        <h1 style={{ fontSize: T.fontSize["2xl"], fontWeight: T.fontWeight.bold, color: T.color.textPrimary, letterSpacing: T.letterSpacing.tight, lineHeight: T.lineHeight.tight, marginBottom: T.space["3"] }}>
          Typography
        </h1>
        <p style={{ fontSize: T.fontSize.base, color: T.color.textSecondary, lineHeight: T.lineHeight.normal }}>
          Choose the type style for your logo. This shapes how your brand voice feels in print and digital.
        </p>
      </div>

      {/* ── Same brand font (redesign only) ── */}
      {isRedesign && (
        <div style={{ marginBottom: T.space["5"] }}>
          <div
            onClick={() => { setSameBrand(v => !v); if (sameBrandFont) { setUploadFont(null); setFontName(""); }; }}
            style={{ display: "flex", alignItems: "center", gap: T.space["4"], background: sameBrandFont ? T.color.accentLight : T.color.surface, border: `1.5px solid ${sameBrandFont ? T.color.accent : T.color.border}`, borderRadius: T.radius.lg, padding: T.space["5"], cursor: "pointer", transition: "all 180ms ease", marginBottom: sameBrandFont ? T.space["4"] : 0 }}

const VARIATION_LABELS = {

function calcTotal(order) {
  const base = 150;
  const extras = Math.max(0, (order.variations?.length || 0) - 1) * 25;
  const typo = (order.typographyType === "custom" && order.customPrice > 0) ? order.customPrice : 0;
  return base + extras + typo;
}
function calcDeposit(total) {
  return Math.round(total * 0.35 / 5) * 5; // round to nearest $5
}

function calcBrandGuidelinesPrice(numVariations) {
  const perVar = BRAND_SERVICES.filter(s => s.perVariation).length;  // 5
  const flat   = BRAND_SERVICES.filter(s => !s.perVariation).length; // 5
  return (perVar * numVariations + flat) * 25;

  const T = window.TOKENS;
  const { useTweaks, TweaksPanel, TweakSection, TweakColor, TweakToggle, TweakSlider, TweakText } = window;
  const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    window.TOKENS.color.accent      = tweaks.accentColor;
    window.TOKENS.color.accentHover = tweaks.accentColor;
    window.TOKENS.color.bg          = tweaks.bgColor;
    document.body.style.background  = tweaks.bgColor;
    window.TOKENS.radius.xl         = tweaks.cardRadius + "px";
  }, [tweaks]);

  // ── State ──
  const [screen, setScreen]           = React.useState("service");
  const [serviceType, setServiceType] = React.useState(null);  // "design" | "redesign"
  const [variations, setVariations]   = React.useState([]);
  const [companyInfo, setCompanyInfo] = React.useState({});
  const [styleInfo, setStyleInfo]     = React.useState({});
  const [uploadInfo, setUploadInfo]   = React.useState({});
  const [colorInfo, setColorInfo]     = React.useState({});
  const [typographyInfo, setTypoInfo] = React.useState({});

  // Determine which flow we're in
  const iconOnly = variations.length > 0 && variations.every(v => v === "icon");
  const hasNonIcon = variations.some(v => v !== "icon");

  let flowKey = "default";
  if (serviceType === "redesign") flowKey = "redesign";
  else if (serviceType === "design" && iconOnly && !hasNonIcon) flowKey = "design_icon";
  else if (serviceType === "design" && (hasNonIcon || variations.length === 0)) flowKey = "design_other";

  const steps    = FLOW_STEPS[flowKey] || FLOW_STEPS.default;
  const stepMap  = SCREEN_STEP[screen] || {};
  const stepIdx  = stepMap[flowKey] ?? stepMap["default"] ?? 0;

  const order = { serviceType, variations, ...companyInfo, ...styleInfo, ...uploadInfo, ...colorInfo, ...typographyInfo };

  return (
    <div style={{ minHeight: "100vh", background: tweaks.bgColor, display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <header style={{ borderBottom: `1px solid ${T.color.border}`, background: T.color.surface, padding: `${T.space["5"]} ${T.space["8"]}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: T.space["3"] }}>
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="7" fill={tweaks.accentColor}/>
            <path d="M7 20L14 8L21 20" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M9.5 16h9" stroke="#fff" strokeWidth="2" strokeLinecap="round"/>
          </svg>
          <span style={{ fontSize: T.fontSize.md, fontWeight: T.fontWeight.bold, color: T.color.textPrimary, letterSpacing: "-0.02em" }}>{tweaks.brandName}</span>
        </div>
      </header>

      {/* Progress */}
      <div style={{ borderBottom: `1px solid ${T.color.border}`, background: T.color.surface, padding: `${T.space["5"]} ${T.space["8"]}` }}>
        <div style={{ maxWidth: "560px" }}>
          <ProgressBar steps={steps} current={stepIdx} />
        </div>
      </div>

      {/* Main */}
      <main style={{ flex: 1, display: "flex", justifyContent: "center", padding: `${T.space["12"]} ${T.space["8"]} ${T.space["24"]}` }}>
        <div style={{ width: "100%", maxWidth: "880px" }}>

          {screen === "service" && (
            <ServiceSelection onSelect={(type) => {
              setServiceType(type);
              setScreen(type === "design" ? "brand-info" : "upload");
            }} />
          )}

          {screen === "brand-info" && (
            <BrandInfoScreen
              onBack={() => setScreen("service")}
              onNext={(info) => { setCompanyInfo(info); setScreen("variations"); }}
            />
          )}

          {screen === "upload" && (
            <UploadScreen
              onBack={() => setScreen("service")}
              onNext={(info) => { setUploadInfo(info); setScreen("style-red"); }}
            />
          )}

          {/* Style picker — redesign path */}
          {screen === "style-red" && (
            <StylePickerScreen
              accentColor={tweaks.accentColor}
              onBack={() => setScreen("upload")}
              onNext={(info) => { setStyleInfo(info); setScreen("variations"); }}
            />
          )}

          {screen === "variations" && (
            <VariationsScreen
              onBack={() => setScreen(serviceType === "redesign" ? "style-red" : "brand-info")}
              onNext={(vars) => {
                setVariations(vars);
                setScreen("style-icon");
              }}
            />
          )}

          {/* Style picker — new logo design (all variation types) */}
          {screen === "style-icon" && (
            <StylePickerScreen
              accentColor={tweaks.accentColor}
              nextLabel={variations.every(v => v === "icon") ? "Next — Colors" : "Next — Details"}
              onBack={() => setScreen("variations")}
              onNext={(info) => {
                setStyleInfo(info);
                const onlyIcon = variations.length > 0 && variations.every(v => v === "icon");
                setScreen(onlyIcon ? "colors" : "typography");
              }}
            />
          )}

          {screen === "typography" && (
            <TypographyScreen
              serviceType={serviceType}
              selectedVariations={variations}
              onBack={() => setScreen(serviceType === "redesign" ? "variations" : "brand-info")}
              onNext={(info) => {
                setTypoInfo(info);
                setScreen("colors");
              }}
            />
          )}

          {/* company-info removed — brand info now collected at step 2 (brand-info / upload screens) */}

          {screen === "colors" && (
            <ColorPickerScreen
              serviceType={serviceType}
              onBack={() => {
                const onlyIcon = variations.length > 0 && variations.every(v => v === "icon");
                setScreen(serviceType === "redesign" ? "variations" : onlyIcon ? "style-icon" : "typography");
              }}
              onNext={(info) => { setColorInfo(info); setScreen("summary"); }}
            />
          )}

          {screen === "summary" && (
            <SummaryScreen
              order={order}
              onBack={() => {
                if (serviceType === "redesign") setScreen("variations");
                else if (variations.every(v => v === "icon")) setScreen("style-icon");
                else setScreen("typography");
              }}
            />
          )}
        </div>
      </main>

      {/* Sticky price footer */}
      {tweaks.showPrice && screen !== "summary" && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 50, background: T.color.surface, borderTop: `1px solid ${T.color.border}`, padding: `${T.space["4"]} ${T.space["8"]}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: T.space["3"] }}>
            <span style={{ fontSize: T.fontSize.sm, color: T.color.textMuted }}>Estimated total</span>
            {variations.length > 1 && (
              <span style={{ fontSize: T.fontSize.xs, color: T.color.textMuted, background: T.color.surfaceAlt, border: `1px solid ${T.color.border}`, borderRadius: T.radius.full, padding: `2px ${T.space["3"]}` }}>
                {variations.length - 1} extra variation{variations.length > 2 ? "s" : ""} +${(variations.length - 1) * 25}
              </span>
            )}
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: T.space["1"] }}>
            <span style={{ fontSize: T.fontSize["2xl"], fontWeight: T.fontWeight.bold, color: T.color.textPrimary }}>${150 + Math.max(0, variations.length - 1) * 25 + (typographyInfo.typographyType === "custom" && typographyInfo.customPrice > 0 ? typographyInfo.customPrice : 0)}</span>
            <span style={{ fontSize: T.fontSize.sm, color: T.color.textMuted }}>total</span>
          </div>
        </div>
      )}

      {/* Tweaks Panel */}
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks}>
        <TweakSection title="Brand">
          <TweakText   id="brandName"   label="Studio name"    tweaks={tweaks} setTweaks={setTweaks} />
          <TweakColor  id="accentColor" label="Accent color"   tweaks={tweaks} setTweaks={setTweaks} />
          <TweakColor  id="bgColor"     label="Background"     tweaks={tweaks} setTweaks={setTweaks} />
        </TweakSection>
        <TweakSection title="Layout">
          <TweakSlider id="cardRadius"  label="Card radius" min={8} max={36} step={2} tweaks={tweaks} setTweaks={setTweaks} />
          <TweakToggle id="showPrice"   label="Show price in header" tweaks={tweaks} setTweaks={setTweaks} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
